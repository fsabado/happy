name: Deploy webapp to GitHub Pages

on:
  push:
    branches: [fsabado-main]
    paths:
      - 'packages/happy-app/**'
      - 'packages/happy-wire/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPO_PUBLIC_HAPPY_SERVER_URL: https://happy-api.fsabado.com
      SKIP_HAPPY_WIRE_BUILD: "1"
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build happy-wire
        run: pnpm --filter @slopus/happy-wire build

      - name: Export web bundle
        run: pnpm --filter happy-app exec expo export --platform web --output-dir dist

      - name: SPA fallback + custom domain
        run: |
          cp packages/happy-app/dist/index.html packages/happy-app/dist/404.html
          echo "happy.fsabado.com" > packages/happy-app/dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/happy-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
